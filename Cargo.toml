[package]
name = "teraslab"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "teraslab-server"
path = "src/bin/server.rs"

[dependencies]
axum = "0.8"
bitflags = "2"
crc32fast = "1"
libc = "0.2"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros"] }
toml = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "spend_throughput"
harness = false

[[bench]]
name = "mixed_workload"
harness = false
