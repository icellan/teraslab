[package]
name = "teraslab"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "teraslab-server"
path = "src/bin/server.rs"

[[bin]]
name = "teraslab-cli"
path = "src/bin/cli.rs"


[dependencies]
axum = { version = "0.8", features = ["ws"] }
bitflags = "2"
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
crc32fast = "1"
crossterm = "0.28"
getrandom = "0.2"
libc = "0.2"
mime_guess = "2"
parking_lot = "0.12"
redb = "2"
ratatui = "0.29"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking"] }
rust-embed = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "io-util", "time"] }
toml = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "spend_throughput"
harness = false

[[bench]]
name = "mixed_workload"
harness = false

[[bench]]
name = "index_ops"
harness = false

[[bench]]
name = "allocator_ops"
harness = false

[[bench]]
name = "codec_ops"
harness = false

[[bench]]
name = "engine_remaining"
harness = false

[[bench]]
name = "alloc_profile"
harness = false
