# cargo-deny configuration (F-X-010).
#
# Policy guard rails for the dependency graph. Run via:
#
#   cargo deny check
#
# CI runs this on every PR (see `.github/workflows/ci.yml`). The initial
# rollout uses `|| true` in CI so this file's rules surface as warnings,
# not hard failures, while the dependency graph is brought into compliance.

[advisories]
# Use the staging RustSec advisory database. `cargo audit` runs alongside
# this; the overlap is intentional defense-in-depth — audit checks the
# Cargo.lock against the same database, while `deny advisories` enforces
# the same rules during dependency resolution.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Yanked crates indicate the maintainer pulled the release for a reason
# (typically a CVE or correctness bug). Warn so we notice and update.
yanked = "warn"
# Justified advisory exceptions (review before adding):
#   RUSTSEC-2024-0436 — `paste` is unmaintained. It is a pulled in
#   transitively by `ratatui` (the admin-CLI TUI) and is a compile-time
#   proc-macro only (no runtime surface); there is no safe upgrade or
#   maintained drop-in replacement. Tracked; re-evaluate when ratatui
#   drops the dependency.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
# License allow-list. New crates with licenses outside this list will be
# flagged. Order matters: more permissive first. Update only after
# reviewing the new license's terms.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    # Community Data License Agreement — Permissive 2.0. Used by
    # `webpki-roots` (the Mozilla CA-certificate bundle) pulled in
    # transitively via the OTLP exporter's reqwest/rustls stack. A
    # permissive data license; safe to allow.
    "CDLA-Permissive-2.0",
]
# Per-crate license exceptions — narrower than `allow` (scoped to one crate),
# so allowing a license here does NOT permit it for the rest of the graph.
exceptions = [
    # `inferno` is CDDL-1.0 — a Rust port of Brendan Gregg's FlameGraph; it
    # renders the SVG for the admin-gated `/debug/pprof/profile` endpoint
    # (src/server/http.rs). CDDL-1.0 is FILE-LEVEL weak copyleft, the same
    # category as MPL-2.0 which this allow-list already permits: its copyleft is
    # scoped to the CDDL-licensed files themselves. Distributing a binary that
    # links inferno (we ship teraslab to node operators) only requires making
    # inferno's own source — unmodified and publicly available on crates.io —
    # available under CDDL; it does NOT relicense or encumber teraslab's own
    # code the way GPL/AGPL would. We use inferno unmodified, so the obligation
    # reduces to source-availability + attribution. Scoped to inferno alone
    # rather than globally allowing CDDL-1.0.
    { crate = "inferno", allow = ["CDDL-1.0"] },
]
# A confidence threshold below 0.8 usually means the detected license is
# a fuzzy match — manual review recommended.
confidence-threshold = 0.8
# The workspace crate (`teraslab`) is a server application, not a
# published library, so it carries no SPDX `license` field. Skip
# license enforcement for our own non-published crate; this only
# affects first-party crates marked `publish = false`.
private = { ignore = true }

[bans]
# Banned crates. None today; placeholder for future policy (e.g. ban
# `openssl-sys` in favour of `rustls-*`).
multiple-versions = "warn"
wildcards = "warn"
deny = []
skip = []
skip-tree = []

[sources]
# Crates must come from crates.io or an explicitly-allowed git source.
# This guards against typo-squatting / a malicious git replacement of a
# well-known crate.
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
