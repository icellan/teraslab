networks:
  ts03-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.0.0/24

volumes:
  ts03-node1-data:
  ts03-node2-data:
  ts03-node3-data:
  ts03-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts03-node1
    hostname: node1
    networks:
      ts03-net:
        ipv4_address: 172.33.0.11
    volumes:
      - ts03-node1-data:/data
      - ts03-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts03-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13030:3300"
      - "19030:9100"
  node2:
    <<: *teraslab-common
    container_name: ts03-node2
    hostname: node2
    networks:
      ts03-net:
        ipv4_address: 172.33.0.12
    volumes:
      - ts03-node2-data:/data
      - ts03-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts03-node2.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13031:3300"
      - "19031:9100"
  node3:
    <<: *teraslab-common
    container_name: ts03-node3
    hostname: node3
    networks:
      ts03-net:
        ipv4_address: 172.33.0.13
    volumes:
      - ts03-node3-data:/data
      - ts03-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts03-node3.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13032:3300"
      - "19032:9100"
