networks:
  ts06-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.36.0.0/24

volumes:
  ts06-node1-data:
  ts06-node2-data:
  ts06-node3-data:
  ts06-node4-data:
  ts06-node5-data:
  ts06-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts06-node1
    hostname: node1
    networks:
      ts06-net:
        ipv4_address: 172.36.0.11
    volumes:
      - ts06-node1-data:/data
      - ts06-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts06-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13060:3300"
      - "19060:9100"
