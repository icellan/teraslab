networks:
  ts04-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.34.0.0/24

volumes:
  ts04-node1-data:
  ts04-node2-data:
  ts04-node3-data:
  ts04-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts04-node1
    hostname: node1
    networks:
      ts04-net:
        ipv4_address: 172.34.0.11
    volumes:
      - ts04-node1-data:/data
      - ts04-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts04-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13040:3300"
      - "19040:9100"
  node2:
    <<: *teraslab-common
    container_name: ts04-node2
    hostname: node2
    networks:
      ts04-net:
        ipv4_address: 172.34.0.12
    volumes:
      - ts04-node2-data:/data
      - ts04-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts04-node2.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13041:3300"
      - "19041:9100"
  node3:
    <<: *teraslab-common
    container_name: ts04-node3
    hostname: node3
    networks:
      ts04-net:
        ipv4_address: 172.34.0.13
    volumes:
      - ts04-node3-data:/data
      - ts04-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts04-node3.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13042:3300"
      - "19042:9100"
