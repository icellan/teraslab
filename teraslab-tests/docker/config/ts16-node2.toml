# --- Test-only security defaults ---
# Docker test cluster runs on a private bridge network with no external
# access; full mTLS is a later wave (see TERANODE_PRODUCTION_READINESS_GAPS.md
# gap #1). The flags below acknowledge that the binary protocol and HTTP
# admin surface are reachable from other containers on the bridge.
cluster_secret = "teraslab-docker-test-secret-not-for-production"
enable_remote_bind = true
enable_admin_endpoints = true
# F-X-002 (production default): strict_auth=true. These static configs
# match the docker test cluster, which deliberately does NOT configure
# a cluster_secret (the test client doesn't HMAC-sign frames). Stay on
# the trusted-overlay opt-out so the safe-defaults check accepts the
# config; the daemon will emit a prominent boot-time warn under
# teraslab::security so operators know they're on the legacy path.
strict_auth = false
