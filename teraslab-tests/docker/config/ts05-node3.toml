node_id = 3
listen_addr = "172.35.0.13:3300"
http_listen_addr = "0.0.0.0:9100"
swim_port = 3301
seed_nodes = ["172.35.0.11:3301", "172.35.0.12:3301"]
replication_factor = 2
migration_pool_size = 128
migration_batch_size = 1000
swim_probe_interval_ms = 150
swim_suspicion_timeout_ms = 1000
device_paths = ["/data/teraslab.dat"]
device_size = 2147483648
device_alignment = 4096
redo_log_size = 67108864
index_snapshot_path = "/data/index.snap"
expected_records = 1000000
lock_stripes = 65536
max_batch_size = 8192
max_connections = 1024
block_height_retention = 288

# test cluster only — production must use mTLS / non-default secret
cluster_secret = "docker-test-cluster-shared-secret-do-not-use-in-prod"
enable_remote_bind = true
enable_admin_endpoints = true
# F-X-002 (production default): strict_auth=true. These static configs
# match the docker test cluster, which deliberately does NOT configure
# a cluster_secret (the test client doesn't HMAC-sign frames). Stay on
# the trusted-overlay opt-out so the safe-defaults check accepts the
# config; the daemon will emit a prominent boot-time warn under
# teraslab::security so operators know they're on the legacy path.
strict_auth = false
