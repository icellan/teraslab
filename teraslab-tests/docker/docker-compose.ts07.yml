networks:
  ts07-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.37.0.0/24

volumes:
  ts07-node1-data:
  ts07-node2-data:
  ts07-node3-data:
  ts07-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts07-node1
    hostname: node1
    networks:
      ts07-net:
        ipv4_address: 172.37.0.11
    volumes:
      - ts07-node1-data:/data
      - ts07-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts07-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13070:3300"
      - "19070:9100"
  node2:
    <<: *teraslab-common
    container_name: ts07-node2
    hostname: node2
    networks:
      ts07-net:
        ipv4_address: 172.37.0.12
    volumes:
      - ts07-node2-data:/data
      - ts07-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts07-node2.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13071:3300"
      - "19071:9100"
  node3:
    <<: *teraslab-common
    container_name: ts07-node3
    hostname: node3
    networks:
      ts07-net:
        ipv4_address: 172.37.0.13
    volumes:
      - ts07-node3-data:/data
      - ts07-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts07-node3.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13072:3300"
      - "19072:9100"
