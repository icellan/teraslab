networks:
  ts12-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.42.0.0/24

volumes:
  ts12-node1-data:
  ts12-node2-data:
  ts12-node3-data:
  ts12-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts12-node1
    hostname: node1
    networks:
      ts12-net:
        ipv4_address: 172.42.0.11
    volumes:
      - ts12-node1-data:/data
      - ts12-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts12-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13120:3300"
      - "19120:9100"
  node2:
    <<: *teraslab-common
    container_name: ts12-node2
    hostname: node2
    networks:
      ts12-net:
        ipv4_address: 172.42.0.12
    volumes:
      - ts12-node2-data:/data
      - ts12-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts12-node2.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13121:3300"
      - "19121:9100"
  node3:
    <<: *teraslab-common
    container_name: ts12-node3
    hostname: node3
    networks:
      ts12-net:
        ipv4_address: 172.42.0.13
    volumes:
      - ts12-node3-data:/data
      - ts12-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts12-node3.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13122:3300"
      - "19122:9100"
