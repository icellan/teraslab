networks:
  ts01-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

volumes:
  ts01-node1-data:
  ts01-node2-data:
  ts01-node3-data:
  ts01-blobstore:

x-teraslab-common: &teraslab-common
  image: teraslab:test
  restart: "no"
  cap_add:
    - NET_ADMIN
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  node1:
    <<: *teraslab-common
    container_name: ts01-node1
    hostname: node1
    networks:
      ts01-net:
        ipv4_address: 172.31.0.11
    volumes:
      - ts01-node1-data:/data
      - ts01-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts01-node1.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13010:3300"
      - "19010:9100"
  node2:
    <<: *teraslab-common
    container_name: ts01-node2
    hostname: node2
    networks:
      ts01-net:
        ipv4_address: 172.31.0.12
    volumes:
      - ts01-node2-data:/data
      - ts01-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts01-node2.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13011:3300"
      - "19011:9100"
  node3:
    <<: *teraslab-common
    container_name: ts01-node3
    hostname: node3
    networks:
      ts01-net:
        ipv4_address: 172.31.0.13
    volumes:
      - ts01-node3-data:/data
      - ts01-blobstore:/blobstore
      - /Users/siggioskarsson/gitcheckout/teraslab/teraslab-tests/client/../docker/config/ts01-node3.toml:/etc/teraslab/node.toml:ro
    ports:
      - "13012:3300"
      - "19012:9100"
