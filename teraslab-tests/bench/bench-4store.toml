# Single-node, FOUR-store benchmark config (standalone, no cluster).
# num_stores = device_paths.len() * device_split = 4 * 1 = 4.
# Each store gets its own fd, SlotAllocator, and RedoLog, so redo fsyncs run
# in parallel across stores. Compare against bench-1store.toml.
node_id = 1
listen_addr = "0.0.0.0:3300"
http_listen_addr = "0.0.0.0:9100"
swim_port = 3301
seed_nodes = []
replication_factor = 1

# FOUR stores.
device_paths = ["/data/d0.dat", "/data/d1.dat", "/data/d2.dat", "/data/d3.dat"]
device_size = 1073741824
device_alignment = 4096
redo_log_size = 67108864
index_snapshot_path = "/data/index.snap"
expected_records = 2000000
lock_stripes = 65536
max_batch_size = 8192
max_connections = 1024
block_height_retention = 288

# Standalone bench: no inter-node auth. Admin/debug routes stay off (the bench
# only needs the unauthenticated /metrics, /health, /status surface).
strict_auth = false
enable_remote_bind = true
enable_admin_endpoints = false

[index]
backend = "memory"
