name: Nightly E2E

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  TERASLAB_FULL_WORKLOAD: "1"

jobs:
  full-e2e:
    name: Full-volume E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Full workload tests
        run: cargo test --test e2e_workload --test stress_tests -- --nocapture

      - name: Slow lib tests (slow-tests feature)
        # Gated behind the `slow-tests` cargo feature so PR runs stay fast.
        # Currently covers three hashtable benchmarks-as-tests in
        # src/index/hashtable.rs: ten_million_entries (~508s debug),
        # bench_lookup_1m and bench_insert_throughput (~6s each debug).
        run: cargo test --features slow-tests --lib

      - name: Criterion benchmarks
        run: cargo bench -- --output-format bencher | tee bench-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench-output.txt
            target/criterion/

  fuzz:
    name: Wire-protocol fuzz (time-boxed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # libFuzzer instrumentation requires nightly Rust.
      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz

      - name: Fuzz decode_request (5 min cap)
        # Coverage-guided exploration of the untrusted wire decoders. The
        # deterministic half (tests/wire_fuzz_smoke.rs) runs on every PR;
        # this is the time-boxed coverage-guided complement. A crash/timeout
        # input fails the job and leaves a repro under fuzz/artifacts/.
        # The fuzz crate is detached from the workspace, so it builds with
        # the nightly toolchain here; `cargo +nightly fuzz` is used to be
        # explicit even though nightly is the active toolchain on this job.
        run: cargo +nightly fuzz run decode_request -- -max_total_time=300 -timeout=10

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  docker-e2e:
    name: Docker cluster E2E (nightly tier)
    runs-on: ubuntu-latest
    # The nightly tier now includes scenarios 14 (Split-Brain Prevention) and
    # 15 (Crash Recovery) — the cardinal no-double-spend durability gates that
    # were previously weekly-only. Their per-scenario timeout caps in
    # run_all.sh add ~37 min worst-case on top of the rest of the nightly set,
    # so the job timeout is raised from 90 to 150 min. Real runs finish well
    # under this; the cap only guards a slow-but-progressing run from CI kill.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Docker image
        run: docker build -t teraslab:test -f teraslab-tests/docker/Dockerfile .

      - name: Build test client
        working-directory: teraslab-tests/client
        run: cargo build --release

      - name: Run nightly scenarios
        working-directory: teraslab-tests
        run: ./run_all.sh --tier nightly

      - name: Collect logs on failure
        if: failure()
        working-directory: teraslab-tests
        run: |
          mkdir -p ci-logs
          for dir in results/*/; do
            cp -r "$dir" ci-logs/ 2>/dev/null || true
          done

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-e2e-logs
          path: teraslab-tests/ci-logs/
          if-no-files-found: ignore
