name: Nightly E2E

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  TERASLAB_FULL_WORKLOAD: "1"

jobs:
  full-e2e:
    name: Full-volume E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Full workload tests
        run: cargo test --test e2e_workload --test stress_tests -- --nocapture

      - name: Slow lib tests (slow-tests feature)
        # Gated behind the `slow-tests` cargo feature so PR runs stay fast.
        # Currently covers three hashtable benchmarks-as-tests in
        # src/index/hashtable.rs: ten_million_entries (~508s debug),
        # bench_lookup_1m and bench_insert_throughput (~6s each debug).
        # See _review/08_test_perf_audit.md for context.
        run: cargo test --features slow-tests --lib

      - name: Criterion benchmarks
        run: cargo bench -- --output-format bencher | tee bench-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench-output.txt
            target/criterion/

  docker-e2e:
    name: Docker cluster E2E (nightly tier)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Docker image
        run: docker build -t teraslab:test -f teraslab-tests/docker/Dockerfile .

      - name: Build test client
        working-directory: teraslab-tests/client
        run: cargo build --release

      - name: Run nightly scenarios
        working-directory: teraslab-tests
        run: ./run_all.sh --tier nightly

      - name: Collect logs on failure
        if: failure()
        working-directory: teraslab-tests
        run: |
          mkdir -p ci-logs
          for dir in results/*/; do
            cp -r "$dir" ci-logs/ 2>/dev/null || true
          done

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-e2e-logs
          path: teraslab-tests/ci-logs/
          if-no-files-found: ignore
