name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release

  go-client:
    name: Go Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: client/go/go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout 60s ./...

      - name: Benchmark (smoke)
        run: go test -bench=. -benchmem -benchtime=1x -timeout 60s ./...
