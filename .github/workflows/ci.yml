name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (workspace)
        # The sibling crates (`client/rust/`, `teraslab-tests/client/`)
        # are not subject to the main crate's disallowed-macros lint since
        # their CLI/test-harness code legitimately uses eprintln!/println!.
        run: cargo clippy --all -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests (default features)
        run: cargo test --all

      - name: Run doctests
        run: cargo test --doc

      - name: Run fault-injection tests
        # Behind a feature flag so production builds stay zero-cost.
        # `cargo test --all` does not enable features; run this target
        # explicitly so the fault_injection integration tests execute.
        run: cargo test --features fault-injection --test fault_injection

      - name: Run Rust client crate tests
        run: cargo test --manifest-path client/rust/Cargo.toml --all

      - name: Run teraslab-tests client unit tests
        # Library-only: integration scenarios under teraslab-tests/client/tests/
        # require a Docker cluster and are exercised in the nightly E2E job.
        run: cargo test --manifest-path teraslab-tests/client/Cargo.toml --lib

      - name: Build release binary
        run: cargo build --release

  go-client:
    name: Go Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: client/go/go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout 60s ./...

      - name: Benchmark (smoke)
        run: go test -bench=. -benchmem -benchtime=1x -timeout 60s ./...
