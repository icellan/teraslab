name: CI

on:
  # Only run on direct pushes to the default branch (post-merge validation).
  # PR branches are covered by the `pull_request` trigger below; running both
  # on a same-repo PR branch ran every job twice.
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

# Cancel an in-progress CI run when a newer commit is pushed to the same ref
# (PR branch or main) so superseded runs don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Rustfmt (main crate)
        run: cargo fmt --all -- --check

      - name: Rustfmt (Rust client crate)
        run: cargo fmt --manifest-path client/rust/Cargo.toml -- --check

      - name: Rustfmt (teraslab-tests client crate)
        run: cargo fmt --manifest-path teraslab-tests/client/Cargo.toml -- --check

      - name: Clippy (main crate, all targets)
        # Covers lib, bins, integration tests, and Criterion benches.
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (Rust client crate)
        # The CLI binary `teraslab-loadgen` legitimately uses eprintln!/println!
        # for user-facing output; that file opts out of the disallowed-macros
        # ban via a file-level `#[allow]`. Library code uses tracing.
        run: cargo clippy --manifest-path client/rust/Cargo.toml --all-targets -- -D warnings

      - name: Clippy (teraslab-tests client crate)
        # The integration scenarios under tests/ are the test-harness reporting
        # channel for CI logs; the crate's clippy.toml drops eprintln!/println!
        # from the disallow list for that reason. Library code in src/ does
        # not use those macros.
        run: cargo clippy --manifest-path teraslab-tests/client/Cargo.toml --all-targets -- -D warnings

      - name: Rustdoc (main crate, deny warnings)
        # Catches broken intra-doc links, references to private items, and
        # malformed code blocks. Sibling crates have no public-API docs to
        # police, so they're exempt.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all

      # F-X-010: dependency supply-chain hygiene. `cargo-audit` flags
      # known CVEs in the dependency tree; `cargo-deny` enforces our
      # policy in `deny.toml` (banned crates, license allow-list, version
      # duplicates). Both run on every PR as BLOCKING gates as of
      # 2026-05-28 (May-2026 external review P0): the previous `|| true`
      # made these visibility-only and let a real CVE land on main
      # without a build failure. If a new advisory appears, fix it
      # (bump, replace, or document a justified `cargo audit --ignore`
      # in `audit.toml`) — do not flip these back to non-blocking.
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Cargo audit (RustSec advisories)
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Cargo deny (policy)
        run: cargo deny check --hide-inclusion-graph

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests (default features)
        # NOTE: the `slow-tests` cargo feature gates three hashtable
        # benchmarks-as-tests in src/index/hashtable.rs that cost ~520s in
        # debug-mode. They are NOT
        # enabled here -- they run on the nightly job via
        # `cargo test --features slow-tests --lib`. Keep them off this step.
        run: cargo test --all

      - name: Run doctests
        run: cargo test --doc

      - name: Run fault-injection tests
        # Behind a feature flag so production builds stay zero-cost.
        # `cargo test --all` does not enable features; run these targets
        # explicitly so the feature-gated integration tests execute.
        # cluster_delayed_activation is the W1.1 regression test for the
        # delayed-topology-activation masterless-shard deadlock.
        # crash_sweep_ops (AUDIT M2.10) runs the 9 WAL-boundary kill/restart
        # sweeps which are also gated behind `fault-injection`; without this
        # they never ran in CI.
        run: cargo test --features fault-injection --test fault_injection --test cluster_delayed_activation --test crash_sweep_ops

      - name: Block-device size ioctl on a real Linux loop device (AUDIT M3.15)
        # Exercises the BLKGETSIZE64 path on a real block device (the macOS RAM
        # disk only covers the Darwin ioctl). Attaches a known-size backing file
        # as a loop device, grants the runner read/write, and points the
        # env-driven test at it; the test skips cleanly when the env is unset.
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          img="$(mktemp)"
          truncate -s 64M "$img"
          dev="$(sudo losetup --find --show "$img")"
          sudo chmod a+rw "$dev"
          size="$(sudo blockdev --getsize64 "$dev")"
          TERASLAB_TEST_BLOCK_DEVICE="$dev" TERASLAB_TEST_BLOCK_DEVICE_SIZE="$size" \
            cargo test --test block_device_size block_device_size_query_against_env_device -- --nocapture
          sudo losetup -d "$dev"
          rm -f "$img"

      - name: Run Rust client crate tests
        run: cargo test --manifest-path client/rust/Cargo.toml --all

      - name: Run teraslab-tests client unit tests
        # Library-only: integration scenarios under teraslab-tests/client/tests/
        # require a Docker cluster and are exercised in the nightly E2E job.
        run: cargo test --manifest-path teraslab-tests/client/Cargo.toml --lib

      - name: Compile benches (no run)
        # Ensure all Criterion benches under benches/ still compile. The
        # nightly workflow actually runs them; here we just guard against
        # bench bitrot on every PR.
        run: cargo bench --no-run --all

      - name: Build release binary
        run: cargo build --release

  go-client:
    name: Go Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: client/go/go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout 60s ./...

      - name: Benchmark (smoke)
        run: go test -bench=. -benchmem -benchtime=1x -timeout 60s ./...

  go-client-integration:
    name: Go Client Integration (live single-node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: client/go/go.mod

      - name: Build server binary
        run: cargo build --release --bin teraslab-server

      - name: Start single-node server
        # Single-node smoke config: binds 127.0.0.1:3300 (client wire protocol)
        # and 127.0.0.1:9100 (HTTP health), one node (replication_factor=1, no
        # seeds). strict_auth=false because TestIntegrationGetPartitionMap
        # issues an inter-node opcode (GetPartitionMap) and the default-on
        # strict_auth would reject it without a configured cluster_secret; the
        # single-node Go client sends no HMAC. Data files land in a tmp working
        # directory. integration_test.go dials TERASLAB_ADDR; the live *cluster*
        # tests skip cleanly because TERASLAB_CLUSTER_SEEDS is unset.
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cat > "$workdir/node.toml" <<'EOF'
          listen_addr = "127.0.0.1:3300"
          http_listen_addr = "127.0.0.1:9100"
          strict_auth = false
          EOF
          ( cd "$workdir" && "$GITHUB_WORKSPACE/target/release/teraslab-server" --config "$workdir/node.toml" ) \
            > "$GITHUB_WORKSPACE/teraslab-server.log" 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9100/health/live >/dev/null; then
              echo "server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy in 60s"
          exit 1

      - name: Run Go integration tests
        working-directory: client/go
        env:
          TERASLAB_ADDR: 127.0.0.1:3300
        run: go test -tags integration -count=1 -timeout 120s -v ./...

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: go-integration-server-log
          path: teraslab-server.log
          if-no-files-found: ignore
